version: '3'
services:
  1panel:
    image: moelin/1panel:v2
    container_name: 1panel-v2
    restart: always
    ports:
      - "10086:10086"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /var/lib/docker/volumes:/var/lib/docker/volumes
      - /opt:/opt
      - /root:/root
    environment:
      - TZ=Asia/Shanghai
      - PORT=10086
      - USERNAME=1panel
      - PASSWORD=1panel_password
      - ENTRANCE=entrance
      - BASE_DIR=/opt
      - RESET=true
    labels:
      createdBy: "Apps"